<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thông tin Sách</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${book.id == null ? 'THÊM SÁCH MỚI' : 'CẬP NHẬT SÁCH'}"></h2>
    <form th:action="@{/books/save}" th:object="${book}" method="POST" class="col-md-6">
        <input type="hidden" th:field="*{id}">
        
        <div class="form-group">
            <label>Tên Sách:</label>
            <input type="text" th:field="*{title}" class="form-group" required>
        </div>
        <div class="form-group">
            <label>Tác Giả:</label>
            <input type="text" th:field="*{author}" class="form-control">
        </div>
        <div class="form-group">
            <label>Link Ảnh:</label>
            <input type="text" th:field="*{imageUrl}" class="form-control">
        </div>
        <div class="form-group">
            <label>Giá:</label>
            <input type="number" th:field="*{price}" class="form-control">
        </div>
        <div class="form-group">
            <label>Thể Loại:</label>
            <select th:field="*{category}" class="form-control">
                <option 
                    th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}">
                </option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-success">Lưu lại</button>
        <a th:href="@{/books}" class="btn btn-secondary">Hủy bỏ</a>
    </form>
</body>
</html>
