<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Quản lý Sách</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 class="text-center text-primary">QUẢN LÝ DANH SÁCH SÁCH</h2>
    <hr>
    
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/books/add}" class="btn btn-primary mb-3">Thêm Sách Mới</a>
    
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
            <tr>
                <th>#</th>
                <th>Tên Sách</th>
                <th>Ảnh</th>
                <th>Tác Giả</th>
                <th>Giá</th>
                <th>Thể Loại</th>
                <th sec:authorize="hasRole('ADMIN')">Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book, status : ${books}">
                <td th:text="${status.count}"></td>
                <td th:text="${book.title}"></td>
                <td>
                    <img th:src="${#strings.startsWith(book.imageUrl, 'http') ? book.imageUrl : '/images/' + book.imageUrl}" 
                         width="80" alt="book-img">
                </td>
                <td th:text="${book.author}"></td>
                <td th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                <td th:text="${book.category.name}"></td>
                
                <td sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-info">Sửa</a>
                    <a th:href="@{/books/delete/{id}(id=${book.id})}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
